# Deploys the playground to GitHub Pages via a plain `git push` to the
# gh-pages branch — zero actions beyond checkout (maximally on-brand;
# see ci.yml's header for the action policy). Pages is configured to
# serve the gh-pages branch root.
name: pages

on:
  push:
    branches: [main]

permissions:
  contents: write # the GITHUB_TOKEN pushes gh-pages

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: rustup target add wasm32-unknown-unknown
      - name: build wasm + bake the playground
        run: |
          cargo rustc --lib --profile wasm --target wasm32-unknown-unknown --crate-type cdylib
          cargo run --release -- --playground index.html --wasm target/wasm32-unknown-unknown/wasm/multiway.wasm
      - name: bake a small atlas as a bonus page
        run: |
          cargo run --release -- --scan --max-lhs 1 --max-rhs 2 --max-arity 2 --max-vars 3 \
            --steps 3 --budget-states 60 --budget-edges 24 --top 15 --quiet --atlas atlas
      - name: push to gh-pages
        run: |
          mkdir -p /tmp/site
          cp index.html /tmp/site/
          cp -r atlas /tmp/site/atlas
          cd /tmp/site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy playground from ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
