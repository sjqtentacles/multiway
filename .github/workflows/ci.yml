# Zero third-party actions except actions/checkout (pinned by SHA), no
# caching (zero dependencies: a cold build is ~4k lines — the cache would
# cost more than it saves), toolchains via the runner's preinstalled rustup.
name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: rustup component add rustfmt clippy
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, "1.63"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: install toolchain
        run: |
          rustup toolchain install ${{ matrix.rust }} --profile minimal
          rustup default ${{ matrix.rust }}
      # The committed golden files byte-compared on every cell ARE the
      # cross-platform determinism proof (same bytes on 3 OSes).
      - run: cargo test --all-targets
      - run: cargo test --doc

  docs:
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: cargo doc --no-deps

  determinism:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: cargo build --release
      - name: classic rule twice, byte-compare
        run: |
          B=target/release/multiway
          run() {
            "$B" --rule '{{x,y},{x,z}}->{{x,z},{x,w},{y,w},{z,w}}' \
                 --init '{{0,0},{0,0}}' --steps 5 --causal 40 \
                 --quiet --json "$1"
          }
          run a.json
          run b.json
          cmp a.json b.json
      - name: smoke — verified baseline numbers present (format-insensitive, greps the JSON)
        run: |
          grep -q '"treeNodes":"280080","canonical":1776' a.json
          grep -q '"backMerges":0' a.json
          grep -q '"teg":' a.json

  props:
    runs-on: ubuntu-latest
    env:
      MULTIWAY_PROP_CASES: "2000"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: cranked property tests (must not be vacuously green)
        run: |
          cargo test --release -- prop_ | tee props.out
          # every prop_ fn name matches at least one test; assert a
          # nonzero count actually ran across the suite
          total=$(grep -Eo '([0-9]+) passed' props.out | awk '{s+=$1} END {print s}')
          echo "prop tests passed: $total"
          test "$total" -gt 0

  perf-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: depth-5 baseline + perf smoke (100x margin)
        run: cargo test --release -- --ignored
